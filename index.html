<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="src/styles/index.css">
    <script src="./widget.min.js"></script>
  </head>
<body style="margin:0; padding: 0;">

<!-- Modal container -->
<div id="test" style="max-width: 1100px; margin: 0 auto;"></div>

<script>
  window.onload = () => {
    widget = window.MAD({
      targetId: 'test',
      // preSelectedPackageId: 'MAD_PRO',
      isFreeTrial: true,
      cssVars: {
        primary: '#00c0b5',
        danger: '#ff6172',
        dark: '#3c3c3c',
        warning: '#ffb637',

        borderColor: '#E5E5E5',

        bgDefault: '#fafaf6',
        bgAccent: "white",

        textColorDefault: '#333',
        textColorReverse: '#fff',
        textColorPlaceholder: '#6B7280',

        fontTitle: '"Open Sans Condensed", sans-serif',
        fontDefault: '"Open Sans", sans-serif',

        fontSizeDefault: '15px',
        fontSizeTitle: '24px',
        fontSizeSubtitle: '18px',
        fontSizeControls: '18px',
        fontSizeCaption: '15px',

        lineHeightDefault: '20px',
        lineHeightTitle: '32px',
        lineHeightSubtitle: '24px',
        lineHeightControls: '18px',
        lineHeightCaption: '20px',

        borderRadiusDefault: '12px',
        borderRadiusXl: '24px',
        borderRadiusMd: '8px',
        borderRadiusSm: '4px',

        clipPathDefault: 'polygon(5% 0%, 95% 0%, 100% 15%, 100% 85%, 95% 100%, 5% 100%, 0% 85%, 0% 15%)',
      },
      env: 'dev-local'
    });
  }
</script>
</body>
</html>
